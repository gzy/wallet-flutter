org.gradle.jvmargs=-Xmx4G

# AGP 8.x 需要 **JDK 17+**。
# 若环境变量 JAVA_HOME 指向 Java 8/11，Gradle 会优先用该 JVM 启动，易触发
# “Android Gradle plugin requires Java 17”。请执行 `unset JAVA_HOME` 或把 JAVA_HOME 指到 17+。
# 下行为本机固定路径；无 Temurin 可改为 `corretto-17.../Contents/Home` 或 AS 自带 Jbr（见下行注释）：
org.gradle.java.home=/Library/Java/JavaVirtualMachines/temurin-21.jdk/Contents/Home
# org.gradle.java.home=/Applications/Android Studio.app/Contents/jbr/Contents/Home
android.useAndroidX=true
android.enableJetifier=true
