<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<meta name="color-scheme" content="light" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<title>Uone · 测试安装</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet" />
	<style>
		:root {
			--bg: #eef2f7;
			--bg2: #e2e8f0;
			--card: #ffffff;
			--card-edge: #f8fafc;
			--stroke: rgba(15, 23, 42, 0.08);
			--text: #0f172a;
			--muted: #64748b;
			--primary: #2563eb;
			--primary-deep: #1d4ed8;
			--primary-soft: rgba(37, 99, 235, 0.1);
			--line: #38bdf8;
			--slate: #475569;
			--slate-soft: rgba(71, 85, 105, 0.08);
			--radius: 20px;
			--font-display: "Plus Jakarta Sans", "Noto Sans SC", system-ui, sans-serif;
			--font-body: "Noto Sans SC", system-ui, sans-serif;
		}
		* { box-sizing: border-box; }
		html { scroll-behavior: smooth; }
		body {
			margin: 0;
			min-height: 100dvh;
			font-family: var(--font-body);
			color: var(--text);
			background-color: var(--bg);
			background-image:
				radial-gradient(ellipse 85% 65% at 50% -5%, rgba(255, 255, 255, 0.9), transparent 50%),
				radial-gradient(ellipse 50% 40% at 100% 0%, rgba(37, 99, 235, 0.07), transparent 45%),
				radial-gradient(ellipse 45% 38% at 0% 100%, rgba(56, 189, 248, 0.08), transparent 48%),
				linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
			line-height: 1.55;
			overflow-x: hidden;
		}
		/* 入场动画 */
		@keyframes rise {
			from { opacity: 0; transform: translateY(14px); }
			to { opacity: 1; transform: translateY(0); }
		}
		.anim > * {
			animation: rise 0.65s cubic-bezier(0.22, 1, 0.36, 1) backwards;
		}
		.anim > *:nth-child(1) { animation-delay: 0.05s; }
		.anim > *:nth-child(2) { animation-delay: 0.12s; }
		.anim > *:nth-child(3) { animation-delay: 0.18s; }
		.anim > *:nth-child(4) { animation-delay: 0.24s; }

		.wrap {
			max-width: 440px;
			margin: 0 auto;
			padding: 2.5rem 1.35rem 3.5rem;
			position: relative;
		}
		/* 装饰角标 */
		.corner-deco {
			position: absolute;
			top: 1.25rem;
			right: 1rem;
			width: 72px;
			height: 72px;
			border: 1px solid var(--stroke);
			border-radius: 50%;
			opacity: 0.65;
			pointer-events: none;
		}
		.corner-deco::after {
			content: "";
			position: absolute;
			inset: 10px;
			border: 1px dashed rgba(100, 116, 139, 0.35);
			border-radius: 50%;
		}

		.eyebrow {
			font-size: 0.68rem;
			font-weight: 700;
			letter-spacing: 0.22em;
			text-transform: uppercase;
			color: var(--primary);
			margin-bottom: 0.65rem;
		}
		h1 {
			font-family: var(--font-display);
			font-size: clamp(1.85rem, 6vw, 2.15rem);
			font-weight: 700;
			line-height: 1.12;
			margin: 0 0 0.5rem;
			letter-spacing: -0.02em;
		}
		h1 span {
			color: var(--muted);
			font-weight: 600;
			font-size: 0.42em;
			letter-spacing: 0.04em;
			vertical-align: middle;
			margin-left: 0.35rem;
		}
		.sub {
			color: var(--muted);
			font-size: 0.94rem;
			margin: 0 0 1.85rem;
			max-width: 36ch;
		}
		.sub strong { color: var(--text); font-weight: 600; }

		.card {
			position: relative;
			background: linear-gradient(165deg, var(--card) 0%, var(--card-edge) 100%);
			border: 1px solid var(--stroke);
			border-radius: var(--radius);
			padding: 1.5rem 1.35rem 1.4rem;
			box-shadow:
				0 1px 0 rgba(255, 255, 255, 0.95) inset,
				0 16px 40px rgba(15, 23, 42, 0.06);
		}
		.card::before {
			content: "";
			position: absolute;
			top: 0; left: 1.5rem; right: 1.5rem;
			height: 2px;
			background: linear-gradient(90deg, transparent, var(--line), var(--primary), var(--line), transparent);
			opacity: 0.55;
			border-radius: 2px;
		}

		.ver {
			display: flex;
			align-items: baseline;
			flex-wrap: wrap;
			gap: 0.35rem 0.75rem;
			font-size: 0.8rem;
			color: var(--muted);
			margin-bottom: 1.25rem;
			font-variant-numeric: tabular-nums;
		}
		.ver strong { color: var(--text); font-weight: 600; }
		.ver-tag {
			font-size: 0.65rem;
			font-weight: 700;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			padding: 0.2rem 0.5rem;
			border-radius: 6px;
			background: var(--primary-soft);
			color: #1e40af;
			border: 1px solid rgba(37, 99, 235, 0.2);
		}

		a.btn-primary {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 0.55rem;
			width: 100%;
			padding: 1rem 1.1rem;
			font-size: 0.98rem;
			font-weight: 700;
			color: #f8fafc;
			background: linear-gradient(165deg, #3b82f6 0%, var(--primary) 45%, var(--primary-deep) 100%);
			border: none;
			border-radius: 14px;
			text-decoration: none;
			box-shadow: 0 8px 24px rgba(37, 99, 235, 0.28);
			transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
		}
		a.btn-primary:hover { filter: brightness(1.03); box-shadow: 0 12px 32px rgba(37, 99, 235, 0.32); }
		a.btn-primary:active { transform: scale(0.985); }

		a.btn-secondary {
			display: flex;
			align-items: center;
			justify-content: center;
			width: 100%;
			margin-top: 0.7rem;
			padding: 0.78rem 1rem;
			font-size: 0.88rem;
			font-weight: 600;
			color: var(--slate);
			background: var(--slate-soft);
			border: 1px solid rgba(71, 85, 105, 0.2);
			border-radius: 14px;
			text-decoration: none;
			transition: background 0.15s ease, border-color 0.15s ease;
		}
		a.btn-secondary:hover {
			background: rgba(71, 85, 105, 0.12);
			border-color: rgba(71, 85, 105, 0.35);
		}

		.hint {
			margin-top: 1.15rem;
			padding: 0.9rem 1rem;
			font-size: 0.8rem;
			line-height: 1.5;
			color: #334155;
			background: #f1f5f9;
			border: 1px solid rgba(148, 163, 184, 0.35);
			border-left: 3px solid var(--primary);
			border-radius: 0 10px 10px 0;
		}

		.meta {
			margin-top: 1.35rem;
			padding-top: 1.15rem;
			border-top: 1px solid var(--stroke);
			font-size: 0.78rem;
			color: var(--muted);
			line-height: 1.55;
		}
		.meta code {
			font-size: 0.74em;
			padding: 0.12em 0.35em;
			border-radius: 4px;
			background: rgba(37, 99, 235, 0.08);
			color: #1d4ed8;
		}

		footer {
			margin-top: 2.25rem;
			text-align: center;
			font-size: 0.72rem;
			color: var(--muted);
			letter-spacing: 0.04em;
		}

		.hidden { display: none !important; }

		/* 小屏装饰收敛 */
		@media (max-width: 380px) {
			.corner-deco { display: none; }
		}
	</style>
</head>
<body>
	<div class="wrap anim">
		<div class="corner-deco" aria-hidden="true"></div>
		<p class="eyebrow" id="badge">测试安装</p>
		<h1>Uone<span>内部版</span></h1>
		<p class="sub" id="sub">正在识别设备…</p>

		<div class="card">
			<div class="ver">
				<span class="ver-tag" id="plat-tag">—</span>
				<span>版本 <strong id="v-name">—</strong> · 构建 <strong id="v-build">—</strong> · 更新 <strong id="v-date">—</strong></span>
			</div>
			<a id="install" class="btn-primary" href="#">主操作</a>
			<a id="install-alt" class="btn-secondary hidden" href="#">其他系统</a>
			<div class="hint" id="hint"></div>
			<div class="meta">
				当前资源基址：<code id="base-url-meta"></code>（站点下的子目录）。请把 <code>index.html</code>、<code>manifest.plist</code>、<code>WalletFlutter.ipa</code>、<code id="apk-name-meta"></code> 上传到该路径；发新版时建议用脚本从 <code>pubspec.yaml</code> 同步版本号与 <code>manifest.plist</code> 内 <code>bundle-version</code>。
			</div>
		</div>

		<footer>com.uone.walletapp</footer>
	</div>

	<script>
		(function () {
			var HOST = "https://app-download-test.uone.me";
			/** 站点上的子目录名，不要首尾斜杠；根目录部署则填 "" */
			var OTA_SUBDIR = "wallet-flutter";
			var ANDROID_APK = "app-release.apk";
			/** 展示用版本号（建议用 tools/sync_ota_version.dart 从 pubspec.yaml 同步） */
			var APP_VERSION_NAME = "1.0.1";
			var APP_BUILD_NUMBER = "4";
			/** 中文年月日；运行 tools/sync_ota_version.dart 时写入为脚本执行当天（本地时区） */
			var APP_RELEASE_DATE = "2026年5月2日";

			function normBase(b) {
				return b.replace(/\/+$/, "");
			}
			function joinOtaBase(host, sub) {
				host = normBase(host);
				sub = String(sub || "").replace(/^\/+|\/+$/g, "");
				return sub ? host + "/" + sub : host;
			}

			function detect() {
				var ua = navigator.userAgent || navigator.vendor || "";
				var iOS = /iPad|iPhone|iPod/i.test(ua);
				if (!iOS && navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1) {
					iOS = true;
				}
				var android = /Android/i.test(ua);
				return { iOS: iOS, android: android, desktop: !iOS && !android };
			}

			var BASE = joinOtaBase(HOST, OTA_SUBDIR);
			var baseMeta = document.getElementById("base-url-meta");
			if (baseMeta) baseMeta.textContent = BASE;
			var apkMeta = document.getElementById("apk-name-meta");
			if (apkMeta) apkMeta.textContent = ANDROID_APK;
			var manifestUrl = BASE + "/manifest.plist";
			var iosHref =
				"itms-services://?action=download-manifest&url=" +
				encodeURIComponent(manifestUrl);
			var androidHref = BASE + "/" + ANDROID_APK;

			var d = detect();
			var sub = document.getElementById("sub");
			var badge = document.getElementById("badge");
			var platTag = document.getElementById("plat-tag");
			var vName = document.getElementById("v-name");
			var vBuild = document.getElementById("v-build");
			var vDate = document.getElementById("v-date");
			var a = document.getElementById("install");
			var alt = document.getElementById("install-alt");
			var hint = document.getElementById("hint");
			if (vName) vName.textContent = APP_VERSION_NAME;
			if (vBuild) vBuild.textContent = APP_BUILD_NUMBER;
			if (vDate) vDate.textContent = APP_RELEASE_DATE;

			if (d.iOS) {
				badge.textContent = "TestFlight / Ad Hoc";
				platTag.textContent = "iOS";
				sub.innerHTML = "已识别为 <strong>iPhone / iPad</strong>。请优先使用 <strong>Safari</strong> 打开本页以完成安装。";
				a.textContent = "安装 iOS 测试版";
				a.href = iosHref;
				alt.classList.remove("hidden");
				alt.textContent = "下载 Android 安装包";
				alt.href = androidHref;
				hint.textContent = "若无法安装：确认设备 UDID 已包含在 Ad Hoc 描述文件中；设置 → 通用 → VPN 与设备管理 → 信任开发者。";
			} else if (d.android) {
				badge.textContent = "内部测试";
				platTag.textContent = "Android";
				sub.innerHTML = "已识别为 <strong>Android</strong>。点击下方按钮下载 APK，并按系统提示允许安装。";
				a.textContent = "下载 Android 安装包";
				a.href = androidHref;
				alt.classList.remove("hidden");
				alt.textContent = "iOS（请用 Safari 打开本页）";
				alt.href = iosHref;
				hint.textContent = "若下载被拦截：使用系统浏览器或 Chrome；在设置中为本应用或「未知来源」开启安装权限。";
			} else {
				badge.textContent = "测试安装";
				platTag.textContent = "桌面";
				sub.innerHTML = "当前环境未识别为手机。请用手机扫码或复制链接打开；也可在下方手动选择系统。";
				a.textContent = "iOS 安装链接（需在 Safari 中打开）";
				a.href = iosHref;
				alt.classList.remove("hidden");
				alt.textContent = "下载 Android APK";
				alt.href = androidHref;
				hint.textContent = "iOS OTA 无法在桌面浏览器完成安装；Android 可直接下载 APK 到手机。";
			}
		})();
	</script>
</body>
</html>
